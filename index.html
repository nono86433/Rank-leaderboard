<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高級排行榜換算工具</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 特殊樣式補充 */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            height: 100vh;
            width: 100%;
            flex: 1;
            background: #0f172a;
        }

        .sidebar {
            width: auto !important;
            border-right: none !important;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
        }

        .main-table-area {
            padding: 24px;
            overflow: auto;
            background: #1e293b;
            margin: 24px 24px 24px 0;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .calc-table {
            border-collapse: collapse;
            width: 100%;
            background: #1e293b;
            color: white;
            font-size: 13px;
        }

        .calc-table th,
        .calc-table td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
            min-width: 80px;
        }

        .calc-table th {
            background: #0f172a;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .bg-blue {
            background: #1d4ed8;
        }

        .bg-pink {
            background: #be185d;
        }

        .bg-green {
            background: #15803d;
        }

        .score-input {
            width: 70px;
            background: transparent;
            border: 1px solid #475569;
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
        }

        .score-input:focus {
            border-color: #8b5cf6;
            outline: none;
        }

        .action-bar {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        /* 手動資料區 */
        .manual-data-zone {
            margin-top: 20px;
            padding: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 10px;
            border: 1px dashed #475569;
        }

        #csvDataInput {
            width: 100%;
            height: 60px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 11px;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 左側幣別清單 -->
        <aside class="sidebar">
            <h2 style="font-size: 1rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                幣別搜尋
            </h2>
            <input type="text" id="searchInput" class="search-input" style="width: 100%; margin-bottom: 15px;"
                placeholder="輸入幣別名稱...">

            <div id="currencySelectionList" class="leaderboard-list">
                <!-- 幣別會顯示在這裡 -->
                <div style="text-align: center; padding: 20px; color: #64748b;">請同步或貼入資料</div>
            </div>

            <div class="manual-data-zone">
                <div style="font-size: 0.75rem; color: #94a3b8; display: flex; justify-content: space-between;">
                    <span>同步失敗？手動貼入 CSV</span>
                    <button onclick="handleManualPaste()"
                        style="background: none; border: none; color: #8b5cf6; cursor: pointer;">匯入</button>
                </div>
                <textarea id="csvDataInput" placeholder="在此貼入試算表匯出的內容..."></textarea>
            </div>

            <button id="syncBtn" class="btn btn-ghost" style="width: 100%; margin-top: 15px; font-size: 0.8rem;">
                同步最新資料
            </button>
        </aside>

            <!-- 右側主功能表格 -->
            <main class="main-table-area">
                <header style="margin-bottom: 20px;">
                    <h1 style="font-size: 1.25rem;">多幣別贏分換算排行榜</h1>
                </header>

                <div style="overflow-x: auto;">
                    <table class="calc-table">
                        <thead>
                            <tr id="tableHeaderRow1">
                                <th colspan="5" class="bg-blue">幣別資訊</th>
                                <th colspan="5" class="bg-pink">累積積分及遊戲 (請填寫贏分)</th>
                                <th id="leaderboardHeader" colspan="1" class="bg-green">排行榜換算區</th>
                            </tr>
                            <tr id="tableHeaderRow2">
                                <th style="width: 60px;">排名</th>
                                <th style="min-width: 120px;">押注帳號</th>
                                <th style="min-width: 100px;">押注幣別</th>
                                <th>ratio</th>
                                <th>rate</th>
                                <th>分數 1</th>
                                <th>分數 2</th>
                                <th>分數 3</th>
                                <th>分數 4</th>
                                <th>總分</th>
                                <!-- 動態生成的排行榜欄位會在這裡 -->
                            </tr>
                        </thead>
                        <tbody id="calcTableBody">
                            <!-- 選取的幣別行會顯示在這裡 -->
                        </tbody>
                    </table>
                </div>

                <div class="action-bar">
                    <button onclick="clearAllScores()" class="btn btn-ghost">清空贏分</button>
                    <button onclick="sortLeaderboard()" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 4h13M3 8h9M3 12h5M13 12l3 3 3-3M16 7v8" />
                        </svg>
                        排序
                    </button>
                </div>
            </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="main.js"></script>
</body>

</html>
