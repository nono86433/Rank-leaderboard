<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高級排行榜換算工具</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 特殊樣式補充 */
        .app-container {
            display: flex;
            gap: 24px;
            height: 100vh;
            width: 100%;
            flex: 1;
            background: #0f172a;
            position: relative;
            transition: gap 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container.sidebar-collapsed {
            gap: 0;
        }

        .sidebar {
            width: 320px !important;
            flex-shrink: 0;
            background-color: var(--sidebar-bg);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
            min-height: 0; /* 讓 flex item 可以縮小，觸發內部捲動 */
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 10;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        border-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border-right: 1px solid var(--border-color) !important;
        }

        .sidebar.collapsed {
            width: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            opacity: 0;
            border-right: none !important;
        }

        /* 側邊欄縮放按鈕樣式 */
        .sidebar-toggle {
            position: absolute;
            left: 320px;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 80px;
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-left: none;
            border-radius: 0 12px 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.2s,
                        color 0.2s,
                        border-radius 0.3s,
                        border-color 0.3s,
                        box-shadow 0.3s;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.2);
            outline: none;
            padding: 0;
        }

        .sidebar-toggle:hover {
            background-color: #334155;
            color: #f8fafc;
            border-color: #475569;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.3);
        }

        .sidebar-toggle svg {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 當側邊欄收合時，按鈕完全移至螢幕最左邊，並維持與版面相符的極簡灰色風格 */
        .app-container.sidebar-collapsed .sidebar-toggle {
            left: 0px;
            transform: translate(0, -50%);
            border-left: 1px solid #334155;
            border-color: #334155;
            background-color: #1e293b;
            color: #94a3b8;
            border-radius: 0 16px 16px 0;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.2);
        }

        .app-container.sidebar-collapsed .sidebar-toggle:hover {
            background-color: #334155;
            border-color: #475569;
            color: #f8fafc;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.3);
        }

        .app-container.sidebar-collapsed .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* 預設隱藏手動刪除按鈕 */
        .delete-currency-btn {
            display: none;
        }

        /* 僅在手動編輯匯率模式下顯示手動刪除按鈕 */
        .app-container.edit-mode .delete-currency-btn {
            display: inline-block;
        }

        .leaderboard-list {
            min-height: 0; /* 讓 flex item 可以縮小，觸發捲動 */
            padding-right: 12px; /* 增加右邊距，保留空間給 hover 時的 translateX(5px) 動畫 */
            overflow-x: hidden; /* 隱藏下方突兀的水平滾動條 */
        }

        /* 幣別清單滾動條樣式 */
        .leaderboard-list::-webkit-scrollbar {
            width: 8px;
        }
        .leaderboard-list::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 4px;
        }
        .leaderboard-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .leaderboard-list::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .main-table-area {
            flex: 1;
            padding: 24px;
            overflow: auto;
            background: #1e293b;
            margin: 24px 24px 24px 0;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container.sidebar-collapsed .main-table-area {
            margin-left: 24px;
        }

        .calc-table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            table-layout: fixed;
            background: #1e293b;
            color: white;
            font-size: 13px;
            border-top: 1px solid #334155;
            border-left: 1px solid #334155;
        }

        .calc-table th,
        .calc-table td {
            border-bottom: 1px solid #334155;
            border-right: 1px solid #334155;
            padding: 8px;
            text-align: center;
            min-width: 80px;
        }

        .calc-table th {
            background: #0f172a;
            color: #ffffff !important;
            font-weight: 700;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .bg-blue {
            background: #1e3a8a !important;
            color: #ffffff !important;
        }

        .bg-pink {
            background: #9d174d !important;
            color: #ffffff !important;
        }

        .bg-green {
            background: #065f46 !important;
            color: #ffffff !important;
        }

        .score-input {
            width: 70px;
            background: transparent;
            border: 1px solid #475569;
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
        }

        .score-input:focus {
            border-color: #8b5cf6;
            outline: none;
        }

        /* 隱藏 Chrome, Edge, Safari 的數字輸入框上下箭頭 */
        .score-input-main::-webkit-outer-spin-button,
        .score-input-main::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 隱藏 Firefox 的數字輸入框上下箭頭 */
        .score-input-main[type=number] {
            -moz-appearance: textfield;
        }

        .action-bar {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        /* --- 凍結欄位相關樣式 --- */
        .col-w-1 { width: 60px; min-width: 60px; max-width: 60px; }
        .col-w-2 { width: 120px; min-width: 120px; max-width: 120px; }
        .col-w-3 { width: 100px; min-width: 100px; max-width: 100px; }
        .col-w-4 { width: 60px; min-width: 60px; max-width: 60px; }
        .col-w-5 { width: 60px; min-width: 60px; max-width: 60px; }
        .col-w-6 { width: 80px; min-width: 80px; max-width: 80px; }
        .col-w-7 { width: 80px; min-width: 80px; max-width: 80px; }
        .col-w-8 { width: 80px; min-width: 80px; max-width: 80px; }
        .col-w-9 { width: 80px; min-width: 80px; max-width: 80px; }
        .col-w-10 { width: 80px; min-width: 80px; max-width: 80px; }

        /* 凍結欄位定位與 left 偏移值 */
        .sticky-col-1 { position: sticky; left: 0px; }
        .sticky-col-2 { position: sticky; left: 60px; }
        .sticky-col-3 { position: sticky; left: 180px; }
        .sticky-col-4 { position: sticky; left: 280px; }
        .sticky-col-5 { position: sticky; left: 340px; }
        .sticky-col-6 { position: sticky; left: 400px; }
        .sticky-col-7 { position: sticky; left: 480px; }
        .sticky-col-8 { position: sticky; left: 560px; }
        .sticky-col-9 { position: sticky; left: 640px; }
        .sticky-col-10 { position: sticky; left: 720px; }

        /* 凍結欄位在表身的樣式 (Td) */
        td.sticky-col-1, td.sticky-col-2, td.sticky-col-3, td.sticky-col-4, td.sticky-col-5,
        td.sticky-col-6, td.sticky-col-7, td.sticky-col-8, td.sticky-col-9, td.sticky-col-10 {
            z-index: 2;
            background: #1e293b !important;
        }

        /* 凍結欄位在 hover 時的背景變亮 */
        tr:hover td.sticky-col-1, tr:hover td.sticky-col-2, tr:hover td.sticky-col-3, tr:hover td.sticky-col-4, tr:hover td.sticky-col-5,
        tr:hover td.sticky-col-6, tr:hover td.sticky-col-7, tr:hover td.sticky-col-8, tr:hover td.sticky-col-9, tr:hover td.sticky-col-10 {
            background: #273549 !important;
        }

        /* 第一排大表頭凍結 */
        .sticky-header-group-1 {
            position: sticky;
            left: 0px;
            z-index: 12 !important;
            background: #1e3a8a !important;
            color: #ffffff !important;
            font-weight: 700;
            font-size: 14px;
            width: 400px;
            min-width: 400px;
            max-width: 400px;
        }
        .sticky-header-group-2 {
            position: sticky;
            left: 400px;
            z-index: 12 !important;
            background: #9d174d !important;
            color: #ffffff !important;
            font-weight: 700;
            font-size: 14px;
            width: 400px;
            min-width: 400px;
            max-width: 400px;
        }

        /* 第二排小表頭凍結 */
        th.sticky-col-1, th.sticky-col-2, th.sticky-col-3, th.sticky-col-4, th.sticky-col-5,
        th.sticky-col-6, th.sticky-col-7, th.sticky-col-8, th.sticky-col-9, th.sticky-col-10 {
            z-index: 10 !important;
            background: #111827 !important;
            color: #f1f5f9 !important;
            font-weight: 600;
            font-size: 13px;
        }

        /* 側邊欄與標題對比優化 */
        .sidebar h2 {
            color: #ffffff !important;
        }
        .sidebar h2 svg {
            color: #a78bfa !important;
        }
        .main-table-area header h1 {
            color: #ffffff !important;
            font-weight: 700;
        }

        /* 單雙數排名行交替背景顏色與懸停高亮 */
        tr.row-odd td {
            background: #1e293b !important;
        }
        tr.row-even td {
            background: #131c2b !important;
        }
        tr.row-odd:hover td, tr.row-even:hover td {
            background: #273549 !important;
        }

        /* 手動拖曳排序樣式 (僅在手動編輯匯率模式下啟用) */
        .app-container.edit-mode .drag-handle {
            cursor: grab;
            user-select: none;
            position: relative;
        }

        .app-container.edit-mode .drag-handle:active {
            cursor: grabbing;
        }

        .app-container.edit-mode .drag-handle::before {
            content: '⋮⋮';
            font-size: 11px;
            color: #475569;
            margin-right: 6px;
            display: inline-block;
            vertical-align: middle;
            opacity: 0.4;
            transition: opacity 0.2s, color 0.2s;
        }

        .app-container.edit-mode tr:hover .drag-handle::before {
            opacity: 1;
            color: #8b5cf6;
        }

        tr.dragging {
            opacity: 0.4;
            background: #334155 !important;
        }
        
        tr.dragging td {
            background: #334155 !important;
            border-top: 1px dashed #8b5cf6 !important;
            border-bottom: 1px dashed #8b5cf6 !important;
        }

        /* High-quality colored ghost buttons in dark mode */
        .btn-success-ghost {
            background: rgba(16, 185, 129, 0.05) !important;
            border: 1px solid rgba(16, 185, 129, 0.4) !important;
            color: #10b981 !important;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-success-ghost:hover {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.25) !important;
            color: #34d399 !important;
        }

        .btn-danger-ghost {
            background: rgba(239, 68, 68, 0.05) !important;
            border: 1px solid rgba(239, 68, 68, 0.4) !important;
            color: #ef4444 !important;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-danger-ghost:hover {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.25) !important;
            color: #f87171 !important;
        }

        .btn-warning-ghost {
            background: rgba(245, 158, 11, 0.05) !important;
            border: 1px solid rgba(245, 158, 11, 0.4) !important;
            color: #f59e0b !important;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-warning-ghost:hover {
            background: rgba(245, 158, 11, 0.15) !important;
            border-color: #f59e0b !important;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.25) !important;
            color: #fbbf24 !important;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 左側幣別清單 -->
        <aside class="sidebar" id="sidebar">
            <h2 style="font-size: 1rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                幣別搜尋
            </h2>
            <input type="text" id="searchInput" class="search-input" style="width: 100%; margin-bottom: 15px;"
                placeholder="輸入幣別名稱...">

            <div id="currencySelectionList" class="leaderboard-list">
                <!-- 幣別會顯示在這裡 -->
                <div style="text-align: center; padding: 20px; color: #64748b;">請同步或貼入資料</div>
            </div>

            <button id="syncBtn" class="btn btn-ghost" style="width: 100%; margin-top: 15px; font-size: 0.8rem;">
                同步最新資料
            </button>
        </aside>

        <!-- 側邊欄縮放按鈕 -->
        <button id="sidebarToggle" class="sidebar-toggle" onclick="toggleSidebar()" aria-label="收合側邊欄">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

            <!-- 右側主功能表格 -->
            <main class="main-table-area">
                <header style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                    <h1 style="font-size: 1.25rem; margin: 0;">多幣別贏分換算排行榜</h1>
                    <button id="toggleEditModeBtn" onclick="toggleEditMode()" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        <span>手動編輯匯率</span>
                    </button>
                </header>

                <div style="overflow-x: auto;">
                    <table class="calc-table">
                        <thead>
                            <tr id="tableHeaderRow1">
                                <th colspan="5" class="sticky-header-group-1">幣別資訊</th>
                                <th colspan="5" class="sticky-header-group-2">累積積分及遊戲 (請填寫贏分)</th>
                                <th id="leaderboardHeader" colspan="1" class="bg-green">排行榜換算區</th>
                            </tr>
                            <tr id="tableHeaderRow2">
                                <th class="sticky-col-1 col-w-1">排名</th>
                                <th class="sticky-col-2 col-w-2">押注帳號</th>
                                <th class="sticky-col-3 col-w-3">押注幣別</th>
                                <th class="sticky-col-4 col-w-4">ratio</th>
                                <th class="sticky-col-5 col-w-5">rate</th>
                                <th class="sticky-col-6 col-w-6">分數 1</th>
                                <th class="sticky-col-7 col-w-7">分數 2</th>
                                <th class="sticky-col-8 col-w-8">分數 3</th>
                                <th class="sticky-col-9 col-w-9">分數 4</th>
                                <th class="sticky-col-10 col-w-10">分數 5</th>
                                <!-- 動態生成的排行榜欄位會在這裡 -->
                            </tr>
                        </thead>
                        <tbody id="calcTableBody">
                            <!-- 選取的幣別行會顯示在這裡 -->
                        </tbody>
                    </table>
                </div>

                <div class="action-bar" style="flex-wrap: wrap;">
                    <button onclick="sortLeaderboard()" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 4h13M3 8h9M3 12h5M13 12l3 3 3-3M16 7v8" />
                        </svg>
                        <span>排序</span>
                    </button>
                    <button id="shareBtn" onclick="generateShareLink()" class="btn btn-success-ghost">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>
                        </svg>
                        <span>產生分享連結</span>
                    </button>
                    <button onclick="clearAllCurrencies()" class="btn btn-danger-ghost">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                        <span>清空所有幣別</span>
                    </button>
                    <button onclick="clearAllScores()" class="btn btn-warning-ghost">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 20H7L3 16c-1-1-1-3 0-4l9-9c1-1 3-1 4 0l4 4c1 1 1 3 0 4L12 20M17 17l-4-4" />
                        </svg>
                        <span>清空贏分</span>
                    </button>
                </div>
            </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="main.js"></script>
</body>

</html>
